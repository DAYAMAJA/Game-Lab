<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mastery Arcade Lab</title>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            background: #1e293b;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        button {

            background:#2563eb;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;

        }

        button:hover {

background:#1d4ed8;

        }

        /*=========================================
  CONTENEDOR RESPONSIVE DEL JUEGO
=========================================*/

        .game-container {

            display: none;
            width: 100%;
            aspect-ratio: 16/9;

            background: #000;

            border-radius: 15px;

            overflow: hidden;

            box-shadow: 0 0 20px rgba(0, 0, 0, .5);

        }

        .game-container iframe {

            width: 100%;

            height: 100%;

            border: none;

        }

        #mensaje {

            font-size: 18px;
            margin-top: 15px;

        }

        #loader{

display:none;

font-size:20px;

margin-top:20px;

color:#FFD54F;

}
    </style>

</head>

<body>

    <header>

        <h1>🎮 Mastery Arcade Lab</h1>

        <p>Laboratorio para probar juegos de GameMonetize</p>

    </header>

    <div class="container">

        <div class="card">

            <h2>Candle Run Game</h2>

            <p>

                Corre, evita obstáculos y mantén viva la llama.

            </p>

            <button onclick="iniciarJuego()">

Jugar

</button>

            <div id="loader">

                ⏳ Cargando juego...

            </div>

            <p id="mensaje"></p>

        </div>

        <div class="game-container" id="contenedorJuego">

            <iframe id="juego" src="https://html5.gamemonetize.co/xrjuqyxnk39uz4ydyjg1de0s45vkk4pr/" allowfullscreen>

            </iframe>

        </div>

    </div>

    <script>
      function iniciarJuego(){

document.getElementById("loader").style.display="block";

document.getElementById("mensaje").innerHTML="";

setTimeout(function(){

document.getElementById("loader").style.display="none";

document.getElementById("contenedorJuego").style.display="block";

document.getElementById("contenedorJuego").scrollIntoView({

behavior:"smooth"

});

},1000);

}
    </script>

</body>

</html>
