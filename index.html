<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mastery Arcade Lab</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

header{
    background:#1e293b;
    padding:20px;
    text-align:center;
}

h1{
    margin:0;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

button{

    background:#22c55e;
    color:white;
    border:none;
    padding:15px 35px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;

}

button:hover{

background:#16a34a;

}

iframe{

width:100%;
height:650px;
border:none;
border-radius:12px;
display:none;

}

#mensaje{

font-size:18px;
margin-top:15px;

}

</style>

</head>

<body>

<header>

<h1>🎮 Mastery Arcade Lab</h1>

<p>Laboratorio para probar juegos de GameMonetize</p>

</header>

<div class="container">

<div class="card">

<h2>Candle Run Game</h2>

<p>

Corre, evita obstáculos y mantén viva la llama.

</p>

<button onclick="iniciarJuego()">

Jugar

</button>

<p id="mensaje"></p>

</div>

<iframe
id="juego"
src="https://html5.gamemonetize.co/xrjuqyxnk39uz4ydyjg1de0s45vkk4pr/"
allowfullscreen>
</iframe>

</div>

<script>

function iniciarJuego(){

document.getElementById("mensaje").innerHTML="Cargando juego...";

document.getElementById("juego").style.display="block";

window.scrollTo({

top:700,

behavior:"smooth"

});

}

</script>

</body>
</html>
